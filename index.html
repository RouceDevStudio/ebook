<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5" />
<meta name="theme-color" content="#ff6f61" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#0b0b0f" media="(prefers-color-scheme: dark)" />
<meta name="description" content="Coral Reader — convierte tu teléfono en un ebook. Biblioteca, lector con pasa-página realista, estadísticas y Coral, tu bibliotecario con IA. 100% offline." />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Coral" />
<meta name="mobile-web-app-capable" content="yes" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icons/favicon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icons/icon-180.png" />
<link rel="stylesheet" href="css/styles.css" />
<title>Coral Reader</title>
</head>
<body data-theme="system" data-reader-theme="sepia">

<!-- ═══════════════ Splash ═══════════════ -->
<div id="splash" class="splash">
  <div class="splash-mark" aria-hidden="true">
    <svg viewBox="0 0 64 64" width="72" height="72">
      <defs><linearGradient id="sg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ff6f61"/><stop offset="1" stop-color="#ff9c8c"/></linearGradient></defs>
      <rect width="64" height="64" rx="16" fill="url(#sg)"/>
      <path d="M32 18 C26 15 18 15 13 17 L13 46 C18 44 26 44 32 47 C38 44 46 44 51 46 L51 17 C46 15 38 15 32 18 Z" fill="#fffcf8"/>
      <path d="M32 18 L32 47" stroke="#ff8175" stroke-width="1.6"/>
    </svg>
  </div>
  <div class="splash-title">Coral</div>
  <div class="splash-sub">tu biblioteca viva</div>
  <div class="splash-bar"><span></span></div>
</div>

<!-- ═══════════════ App ═══════════════ -->
<div id="app" class="app" hidden>

  <!-- Top bar -->
  <header class="topbar" id="topbar">
    <button class="icon-btn" id="btnMenu" aria-label="Menú" title="Menú">
      <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <div class="topbar-title" id="topbarTitle">Biblioteca</div>
    <div class="topbar-actions">
      <button class="icon-btn" id="btnSearch" aria-label="Buscar" title="Buscar">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      </button>
      <button class="icon-btn" id="btnCoral" aria-label="Coral" title="Coral, tu bibliotecario">
        <svg viewBox="0 0 24 24"><path d="M12 3c4.5 0 8 3 8 7 0 2.5-1.6 4-3 5-1 .7-1 2-1 3H8c0-1 0-2.3-1-3-1.4-1-3-2.5-3-5 0-4 3.5-7 8-7z"/><path d="M9 20h6"/></svg>
      </button>
      <button class="icon-btn" id="btnViewMode" aria-label="Cambiar vista" title="Vista">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </button>
    </div>
  </header>

  <!-- Search overlay -->
  <div class="search-overlay" id="searchOverlay" hidden>
    <div class="search-box">
      <svg viewBox="0 0 24 24" class="search-ico"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input type="search" id="searchInput" placeholder="Título, autor, frase, ISBN, etiqueta, nota…" autocomplete="off" />
      <button class="icon-btn" id="btnSearchClose" aria-label="Cerrar">
        <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
    </div>
    <div class="search-recents" id="searchRecents"></div>
    <div class="search-results" id="searchResults"></div>
  </div>

  <!-- Main content: views injected here -->
  <main class="content" id="content"></main>

  <!-- Floating action button -->
  <button class="fab" id="fab" aria-label="Añadir libros" title="Importar / crear">
    <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
  </button>

  <!-- Bottom navigation -->
  <nav class="bottomnav" id="bottomnav">
    <button class="nav-item is-active" data-view="library">
      <svg viewBox="0 0 24 24"><path d="M4 5h6v14H4zM14 5h6v14h-6z"/></svg><span>Biblioteca</span>
    </button>
    <button class="nav-item" data-view="explorer">
      <svg viewBox="0 0 24 24"><path d="M3 7h5l2 2h11v9H3z"/></svg><span>Archivos</span>
    </button>
    <button class="nav-item" data-view="stats">
      <svg viewBox="0 0 24 24"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg><span>Stats</span>
    </button>
    <button class="nav-item" data-view="coral">
      <svg viewBox="0 0 24 24"><path d="M12 3c4.5 0 8 3 8 7 0 2.5-1.6 4-3 5-1 .7-1 2-1 3H8c0-1 0-2.3-1-3-1.4-1-3-2.5-3-5 0-4 3.5-7 8-7z"/></svg><span>Coral</span>
    </button>
    <button class="nav-item" data-view="settings">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 00-.1-1l2-1.6-2-3.4-2.3 1a7 7 0 00-1.7-1l-.3-2.5H9.4L9 4.5a7 7 0 00-1.7 1l-2.3-1-2 3.4L5 11a7 7 0 000 2l-2 1.6 2 3.4 2.3-1a7 7 0 001.7 1l.3 2.5h4.2l.3-2.5a7 7 0 001.7-1l2.3 1 2-3.4-2-1.6a7 7 0 00.1-1z"/></svg><span>Ajustes</span>
    </button>
  </nav>

  <!-- Side drawer -->
  <aside class="drawer" id="drawer" hidden>
    <div class="drawer-head">
      <div class="drawer-brand">
        <svg viewBox="0 0 64 64" width="34" height="34"><rect width="64" height="64" rx="16" fill="#ff6f61"/><path d="M32 18 C26 15 18 15 13 17 L13 46 C18 44 26 44 32 47 C38 44 46 44 51 46 L51 17 C46 15 38 15 32 18 Z" fill="#fffcf8"/></svg>
        <div><b>Coral Reader</b><small id="drawerCount">— libros</small></div>
      </div>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
  </aside>
  <div class="scrim" id="scrim" hidden></div>
</div>

<!-- Reader (fullscreen overlay) -->
<div id="reader" class="reader" hidden></div>

<!-- Modal host -->
<div id="modalHost" class="modal-host" hidden></div>

<!-- Toast host -->
<div id="toastHost" class="toast-host" aria-live="polite"></div>

<!-- Hidden file input -->
<input type="file" id="fileInput" multiple hidden
  accept=".epub,.pdf,.mobi,.azw,.azw3,.cbz,.cbr,.fb2,.txt,.html,.htm,.md,.markdown,.docx" />
<input type="file" id="folderInput" webkitdirectory multiple hidden />
<input type="file" id="coverInput" accept="image/*" hidden />

<!-- Librerías vendorizadas (UMD → globales window.fflate / window.pdfjsLib) -->
<script src="js/vendor/fflate.min.js"></script>
<script src="js/vendor/pdf.min.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
